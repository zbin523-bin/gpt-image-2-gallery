<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT-Image-2 提示词案例库 | Prompt Gallery</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; }
  .card-img { aspect-ratio: 1/1; object-fit: cover; transition: transform 0.3s; }
  .card:hover .card-img { transform: scale(1.05); }
  .modal-overlay { backdrop-filter: blur(4px); }
  .prompt-arg { background: #fef3c7; border: 1px solid #f59e0b; padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 0.85em; }
  .cat-badge { transition: all 0.2s; }
  .cat-badge.active { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .search-input:focus { box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
  .fade-in { animation: fadeIn 0.3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .scroll-top { position: fixed; bottom: 20px; right: 20px; z-index: 50; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">G2</div>
        <div>
          <h1 class="text-lg font-semibold text-gray-900">GPT-Image-2 提示词案例库</h1>
          <p class="text-xs text-gray-500">692 精选案例 · 7 大分类 · 搜索 & 预览</p>
        </div>
      </div>
      <div class="flex-1 max-w-xl mx-4">
        <div class="relative">
          <input id="searchInput" type="text" placeholder="搜索提示词、标题、关键词..." 
            class="search-input w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500 transition">
          <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
      </div>
      <div class="text-xs text-gray-400" id="resultCount"></div>
    </div>
  </div>
</header>

<!-- Category Nav -->
<nav class="bg-white border-b border-gray-100 sticky top-[57px] z-30">
  <div class="max-w-7xl mx-auto px-4 py-2 flex gap-2 overflow-x-auto" id="categoryNav">
    <!-- Filled by JS -->
  </div>
</nav>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 py-6">
  <div id="galleryGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
    <!-- Filled by JS -->
  </div>
  <div id="noResults" class="hidden text-center py-20 text-gray-400">
    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <p class="text-lg">没有找到匹配的案例</p>
    <p class="text-sm mt-1">尝试其他关键词或切换分类</p>
  </div>
</main>

<!-- Detail Modal -->
<div id="detailModal" class="hidden fixed inset-0 z-50 modal-overlay bg-black/60">
  <div class="absolute inset-4 md:inset-8 lg:inset-12 bg-white rounded-2xl shadow-2xl overflow-auto">
    <button id="closeModal" class="absolute top-4 right-4 w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-600 transition z-10">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div id="modalContent" class="p-6 md:p-8">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<!-- Scroll to top -->
<button id="scrollTopBtn" class="scroll-top hidden w-10 h-10 bg-blue-500 hover:bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center transition">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
</button>

<script>
// ============ DATA LOADING ============
let allData = [];
let currentCategory = 'all';
let currentSearch = '';

async function loadData() {
  try {
    const resp = await fetch('data.json');
    allData = await resp.json();
    console.log(`Loaded ${allData.length} cases`);
    initUI();
  } catch(e) {
    console.error('Failed to load data:', e);
    document.getElementById('galleryGrid').innerHTML = '<p class="col-span-full text-center text-red-500 py-10">数据加载失败，请刷新页面重试</p>';
  }
}

// ============ CATEGORIES ============
const CATEGORIES = [
  { key: 'all', label: '全部', icon: '🎯' },
  { key: 'Portrait & Photography', label: '人像摄影', icon: '🍌' },
  { key: 'Poster & Illustration', label: '海报插画', icon: '🎨' },
  { key: 'E-commerce', label: '电商图', icon: '🛒' },
  { key: 'Ad Creative', label: '广告创意', icon: '📣' },
  { key: 'Character Design', label: '角色设计', icon: '🧍' },
  { key: 'UI & Social Media Mockup', label: 'UI/社媒', icon: '📱' },
  { key: 'Comparison & Community', label: '对比/社区', icon: '🧪' },
];

function getCategoryCount(catKey) {
  if (catKey === 'all') return allData.length;
  return allData.filter(d => d.category === catKey).length;
}

function initCategoryNav() {
  const nav = document.getElementById('categoryNav');
  nav.innerHTML = CATEGORIES.map(c => 
    `<button data-cat="${c.key}" class="cat-badge px-3 py-1.5 rounded-lg text-sm font-medium border transition whitespace-nowrap
      ${c.key === 'all' ? 'bg-blue-500 text-white border-blue-500 active' : 'bg-white text-gray-700 border-gray-200 hover:border-blue-300 hover:bg-blue-50'}">
      ${c.icon} ${c.label} <span class="text-xs opacity-70">${getCategoryCount(c.key)}</span>
    </button>`
  ).join('');

  nav.querySelectorAll('.cat-badge').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCategory = btn.dataset.cat;
      nav.querySelectorAll('.cat-badge').forEach(b => {
        b.classList.remove('active', 'bg-blue-500', 'text-white', 'border-blue-500');
        b.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
      });
      btn.classList.add('active', 'bg-blue-500', 'text-white', 'border-blue-500');
      btn.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
      renderGallery();
    });
  });
}

// ============ SEARCH ============
function setupSearch() {
  const input = document.getElementById('searchInput');
  let debounceTimer;
  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      currentSearch = input.value.trim().toLowerCase();
      renderGallery();
    }, 200);
  });
}

// ============ GALLERY RENDERING ============
function getFilteredData() {
  let data = allData;
  if (currentCategory !== 'all') {
    data = data.filter(d => d.category === currentCategory);
  }
  if (currentSearch) {
    data = data.filter(d => {
      const searchFields = [d.title_en, d.title_zh, d.prompt, d.category, d.author].join(' ').toLowerCase();
      return searchFields.includes(currentSearch);
    });
  }
  return data;
}

function highlightArguments(text) {
  // Highlight {argument name=... default=...} patterns
  return text.replace(/\{argument\s+name="([^"]+)"\s+default="([^"]+)"\}/g, 
    '<span class="prompt-arg" title="可替换参数：$1，默认值：$2">{$1=$2}</span>');
}

function truncatePrompt(prompt, maxLen = 120) {
  if (!prompt) return '';
  if (prompt.length <= maxLen) return prompt;
  return prompt.substring(0, maxLen) + '...';
}

function renderGallery() {
  const data = getFilteredData();
  const grid = document.getElementById('galleryGrid');
  const noResults = document.getElementById('noResults');
  const countEl = document.getElementById('resultCount');

  countEl.textContent = `${data.length} 个案例`;

  if (data.length === 0) {
    grid.innerHTML = '';
    noResults.classList.remove('hidden');
    return;
  }
  noResults.classList.add('hidden');

  grid.innerHTML = data.map(d => {
    const title = d.title_zh || d.title_en || `Case ${d.case_id || '?'}`;
    const titleEn = d.title_en || '';
    const promptShort = truncatePrompt(d.prompt, 100);
    const catLabel = CATEGORIES.find(c => c.key === d.category)?.label || d.category;
    
    return `<div class="card bg-white rounded-xl border border-gray-200 overflow-hidden cursor-pointer hover:shadow-lg hover:border-blue-300 transition fade-in" data-id="${d.id}">
      <div class="relative overflow-hidden bg-gray-100">
        <img src="${d.image_url}" alt="${title}" class="card-img w-full" loading="lazy"
          onerror="this.src=''; this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-full text-gray-400 text-sm\\'>图片不可用</div>'">
        <div class="absolute top-2 left-2 px-2 py-0.5 rounded-md text-xs font-medium bg-white/90 shadow-sm">
          ${d.category_icon} ${catLabel}
        </div>
        ${d.has_arguments ? '<div class="absolute top-2 right-2 px-1.5 py-0.5 rounded-md text-xs bg-yellow-100 text-yellow-800">有参数</div>' : ''}
      </div>
      <div class="p-3">
        <h3 class="text-sm font-semibold text-gray-900 line-clamp-2 mb-1">${title}</h3>
        ${titleEn !== title ? `<p class="text-xs text-gray-500 line-clamp-1 mb-1">${titleEn}</p>` : ''}
        <p class="text-xs text-gray-400 line-clamp-2">${promptShort}</p>
      </div>
    </div>`;
  }).join('');

  // Add click handlers
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => showDetail(card.dataset.id));
  });
}

// ============ DETAIL MODAL ============
function showDetail(id) {
  const d = allData.find(e => e.id === id);
  if (!d) return;

  const modal = document.getElementById('detailModal');
  const content = document.getElementById('modalContent');
  const catLabel = CATEGORIES.find(c => c.key === d.category)?.label || d.category;
  const title = d.title_zh || d.title_en || `Case ${d.case_id || '?'}`;

  content.innerHTML = `
    <div class="flex flex-col lg:flex-row gap-6">
      <div class="lg:w-1/2">
        <div class="bg-gray-100 rounded-xl overflow-hidden">
          <img src="${d.image_url}" alt="${title}" class="w-full object-contain max-h-[70vh]"
            onerror="this.src=''; this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-64 text-gray-400\\'>图片不可用</div>'">
        </div>
      </div>
      <div class="lg:w-1/2 flex flex-col">
        <div class="flex items-center gap-2 mb-3">
          <span class="px-2 py-1 rounded-md text-xs font-medium bg-blue-100 text-blue-800">${d.category_icon} ${catLabel}</span>
          ${d.has_arguments ? '<span class="px-2 py-1 rounded-md text-xs bg-yellow-100 text-yellow-800">有可替换参数</span>' : ''}
          <span class="text-xs text-gray-400">Case ${d.case_id || '?'}</span>
        </div>
        <h2 class="text-xl font-bold text-gray-900 mb-1">${title}</h2>
        ${d.title_en !== title && d.title_zh ? `<p class="text-sm text-gray-500 mb-3">${d.title_en}</p>` : ''}
        ${d.author ? `<p class="text-xs text-gray-400 mb-3">作者: @${d.author}</p>` : ''}
        
        <div class="flex-1">
          <h3 class="text-sm font-semibold text-gray-700 mb-2 flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            提示词 Prompt
          </h3>
          <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 text-sm text-gray-800 leading-relaxed overflow-auto max-h-[50vh] whitespace-pre-wrap break-words" id="promptText">
            ${highlightArguments(d.prompt || '暂无提示词')}
          </div>
        </div>
        
        <div class="flex gap-2 mt-4">
          <button onclick="copyPrompt('${id}')" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-medium transition flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
            复制提示词
          </button>
          ${d.tweet_url ? `<a href="${d.tweet_url}" target="_blank" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            原始Tweet
          </a>` : ''}
          <button onclick="downloadImage('${d.image_url}')" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            下载图片
          </button>
        </div>
      </div>
    </div>
  `;

  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('detailModal').classList.add('hidden');
  document.body.style.overflow = '';
}

function copyPrompt(id) {
  const d = allData.find(e => e.id === id);
  if (!d || !d.prompt) return;
  navigator.clipboard.writeText(d.prompt).then(() => {
    // Show brief feedback
    const btn = document.querySelector('[onclick="copyPrompt(\''+id+'\')"]');
    const origText = btn.innerHTML;
    btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> 已复制';
    setTimeout(() => btn.innerHTML = origText, 2000);
  });
}

function downloadImage(url) {
  if (!url) return;
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gpt-image-2-output.jpg';
  a.target = '_blank';
  a.click();
}

// ============ SCROLL TOP ============
function setupScrollTop() {
  const btn = document.getElementById('scrollTopBtn');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('hidden', window.scrollY < 400);
  });
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
}

// ============ MODAL CLOSE ============
function setupModal() {
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('detailModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('detailModal')) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
}

// ============ INIT ============
function initUI() {
  initCategoryNav();
  setupSearch();
  renderGallery();
  setupScrollTop();
  setupModal();
}

loadData();
</script>
</body>
</html>
